instructions: |
  ## 三线法选股策略

  ### 策略定位
  稳健的价值投资策略，通过分批建仓降低买入风险

  ### 核心条件
  - 市盈率(PE-TTM) < 15倍
  - 市净率(PB) < 2.0
  - 三条买入线：
    - 第一建仓线：PB < 1.5，轻仓试探（30%仓位）
    - 第二建仓线：PB < 1.0，加仓确认（40%仓位）
    - 第三建仓线：PB < 0.8，重仓出击（30%仓位）

  ### 筛选要求
  1. 优先选择行业龙头
  2. 排除ST股、*ST股
  3. 排除近一年内有重大违法违规的公司
  4. 优先选择有稳定分红记录的公司
  5. 市值 > 30亿（避免过小标的）

  ### 输出格式
  请按以下JSON数组格式返回候选股票列表：
  ```json
  [
    {"code": "股票代码", "name": "股票名称", "reason": "入选理由（50字以内）", "score": 评分(0-100)}
  ]
  ```
