instructions: |
  ## 价值收废品策略

  ### 策略定位
  深度价值投资策略，专门寻找破净股（PB < 1.0），以低于净资产的价格买入

  ### 核心条件
  - 市净率(PB) < 1.0（股价低于每股净资产）
  - PB越低越好
  - 优先选择PB < 0.5的标的
  - 排除ST股、*ST股
  - 排除连续亏损的公司

  ### 筛选要求
  1. 确认净资产数据真实可靠（排除商誉占比过高的公司）
  2. 优先选择资产质量好的公司（现金及等价物占比高）
  3. 排除有重大诉讼或债务风险的公司
  4. 优先选择行业处于周期底部的公司
  5. 市值 > 20亿

  ### 输出格式
  请按以下JSON数组格式返回候选股票列表：
  ```json
  [
    {"code": "股票代码", "name": "股票名称", "reason": "入选理由（50字以内）", "score": 评分(0-100)}
  ]
  ```
