  <rect x="80" y="836" width="1440" height="40" rx="12" fill="#101827"/>
  <text x="120" y="863" fill="#B4C6DA" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    Single is cheaper and faster. Multi is clearer and more controllable. Debate is strongest for conflict-heavy reasoning, but slowest and most expensive.
  </text>
