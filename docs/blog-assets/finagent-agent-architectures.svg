  <text x="84" y="102" fill="#E8EEF8" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">
    Agent Architecture Modes in FinAgent
  </text>
  <text x="84" y="141" fill="#93A7C0" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    Three reasoning paths: lower-cost single-agent, role-split multi-agent, and explicit bull-bear debate
  </text>

  <rect x="80" y="210" width="430" height="600" rx="24" fill="#11223E" stroke="#28456D"/>
  <text x="112" y="258" fill="#9ED7FF" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Single Agent</text>
  <text x="112" y="290" fill="#DCE9F6" font-family="Segoe UI, Arial, sans-serif" font-size="19">ReAct loop with tool calling</text>
  <rect x="140" y="340" width="310" height="76" rx="14" fill="#193056"/><text x="214" y="386" fill="#EEF5FD" font-family="Segoe UI, Arial, sans-serif" font-size="24">User Query</text>
