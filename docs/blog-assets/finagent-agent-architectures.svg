  <rect x="585" y="210" width="430" height="600" rx="24" fill="#13281F" stroke="#2E6D53"/>
  <text x="617" y="258" fill="#9EF3C3" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Multi Agent</text>
  <text x="617" y="290" fill="#DDF7E8" font-family="Segoe UI, Arial, sans-serif" font-size="19">Pipeline with specialized roles</text>
  <rect x="645" y="336" width="120" height="64" rx="12" fill="#1E3C31"/><text x="671" y="376" fill="#F0FFF7" font-family="Segoe UI, Arial, sans-serif" font-size="22">Technical</text>
