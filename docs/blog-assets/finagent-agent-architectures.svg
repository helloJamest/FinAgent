  <text x="1122" y="290" fill="#F7DEF0" font-family="Segoe UI, Arial, sans-serif" font-size="19">Explicit bull-bear confrontation</text>
  <rect x="1148" y="340" width="120" height="70" rx="14" fill="#4B233E"/><text x="1188" y="383" fill="#FFF0FA" font-family="Segoe UI, Arial, sans-serif" font-size="24">Bull</text>
