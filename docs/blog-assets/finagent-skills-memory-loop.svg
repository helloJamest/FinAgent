<svg width="1600" height="940" viewBox="0 0 1600 940" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="940" fill="#09111B"/>
  <rect x="28" y="28" width="1544" height="884" rx="28" fill="#0E1728" stroke="#21324B" stroke-width="2"/>
  <text x="84" y="104" fill="#E6EEF8" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">
    Skills, Memory, Reflection, and Learning Loop
  </text>
  <text x="84" y="144" fill="#90A5C1" font-family="Segoe UI, Arial, sans-serif" font-size="20">
    The path from prebuilt domain knowledge to stored lessons, learned skills, and future prompt injections
  </text>

  <rect x="92" y="226" width="320" height="180" rx="22" fill="#14213D" stroke="#2B4A73"/>
