  <text x="124" y="350" fill="#E0EBF8" font-family="Segoe UI, Arial, sans-serif" font-size="22">router selects active skills</text>
  <text x="124" y="384" fill="#E0EBF8" font-family="Segoe UI, Arial, sans-serif" font-size="22">skill agents produce opinions</text>

  <rect x="474" y="226" width="320" height="180" rx="22" fill="#132A22" stroke="#2B6A53"/>
  <text x="506" y="274" fill="#9DEFC0" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Runtime Memory</text>
  <text x="506" y="316" fill="#E4F7EB" font-family="Segoe UI, Arial, sans-serif" font-size="22">recent analysis history</text>
  <text x="506" y="350" fill="#E4F7EB" font-family="Segoe UI, Arial, sans-serif" font-size="22">confidence calibration</text>
  <text x="506" y="384" fill="#E4F7EB" font-family="Segoe UI, Arial, sans-serif" font-size="22">skill performance weighting</text>

