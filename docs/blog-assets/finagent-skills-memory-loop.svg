  <text x="888" y="274" fill="#F7C58D" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Reflection</text>
  <text x="888" y="316" fill="#F9E7D7" font-family="Segoe UI, Arial, sans-serif" font-size="22">prediction vs actual</text>
  <text x="888" y="350" fill="#F9E7D7" font-family="Segoe UI, Arial, sans-serif" font-size="22">lesson extraction</text>
  <text x="888" y="384" fill="#F9E7D7" font-family="Segoe UI, Arial, sans-serif" font-size="22">prompt injection guidance</text>

