  <text x="1270" y="350" fill="#EFE9FF" font-family="Segoe UI, Arial, sans-serif" font-size="22">skill memory</text>
  <text x="1270" y="384" fill="#EFE9FF" font-family="Segoe UI, Arial, sans-serif" font-size="22">debate tracker</text>

