<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#0A1018"/>
  <rect x="28" y="28" width="1544" height="844" rx="28" fill="#0F172A" stroke="#23344F" stroke-width="2"/>
  <text x="84" y="104" fill="#E7EEF8" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">
